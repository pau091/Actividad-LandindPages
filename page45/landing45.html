<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Design Landing</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="page_45.css" />
</head>
<body>

  <main class="layout">

    <section class="left">

      <div class="hero">
        <h1>
          Design, create,<br>
          and be passionate
        </h1>

        <p>
          Lorem ipsum dolor sit amet, consectetur
          adipiscing elit. Cursus imperdiet sed id.
        </p>

        <a href="#" class="btn-primary">Get started</a>
      </div>

      <div class="bottom-grid">

        <div class="card card-02">
          <img src="img/Image bottom left - left.png" alt="Abstract shape">
          <div class="overlay">
            <span class="number">02</span>
            <span class="label">Go with your heart</span>
          </div>
        </div>

        <div class="card card-03">
          <img src="img/Image bottom left - right.png" alt="Circular abstract">
          <div class="overlay">
            <span class="number">03</span>
            <span class="label">Live a full life</span>
          </div>
        </div>

      </div>
    </section>

    <section class="right">
      <div class="top-label">
        <span class="number">01</span>
        <span class="label">Discover the world</span>
      </div>

      <div class="image-wrapper">
        <img src="img/Image left.png" alt="Mac illustration">
      </div>
    </section>

  </main>

</html>
